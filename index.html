<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NégoImmo · KPI 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#7a786f;font-size:14px">
      Chargement…
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL  = 'https://kkuplsgymvbyylkqrtdk.supabase.co'
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrdXBsc2d5bXZieXlsa3FydGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjUyNjcsImV4cCI6MjA5MjcwMTI2N30.yC-o4cA2wovJj4okPoZTSNXtWDIggU8gdpNQWfgSAsA'
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON)

    const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre']
    const CONFIG_DEFAULTS = { objectif_ca:160000, objectif_ca_off:200000, objectif_excl_pct:50, objectif_mandats:36, taux_tva:1.20, annee:2026, mois_ecoules:3.6 }
    const fmt  = v => (+v||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0})
    const fmtN = v => Math.round(+v||0).toLocaleString('fr-FR')
    const moisNum = d => d ? new Date(d).getMonth()+1 : null

    let _user=null, _mandats=[], _config={...CONFIG_DEFAULTS}, _currentPage='dashboard'

    // ── AUTH ──
    const getUser   = async () => (await supabase.auth.getUser()).data.user
    const login     = async (e,p) => { const {data,error}=await supabase.auth.signInWithPassword({email:e,password:p}); if(error)throw error; return data }
    const signup    = async (e,p) => { const {data,error}=await supabase.auth.signUp({email:e,password:p}); if(error)throw error; return data }
    const logout    = async () => supabase.auth.signOut()

    // ── DATA ──
    const getConfig  = async () => { const {data}=await supabase.from('config').select('*').eq('user_id',_user.id).maybeSingle(); return {...CONFIG_DEFAULTS,...data} }
    const getMandats = async () => { const {data,error}=await supabase.from('mandats').select('*').order('created_at',{ascending:false}); if(error)throw error; return data||[] }
    const addMandatDB = async m => {
      const hon_ht = m.hon_ttc ? m.hon_ttc/1.20 : null
      const comm_nego_ht = (hon_ht&&m.pct_nego) ? hon_ht*m.pct_nego/100 : null
      const comm_nego_ttc = comm_nego_ht ? comm_nego_ht*1.20 : null
      const {data,error}=await supabase.from('mandats').insert({user_id:_user.id,...m,hon_ht,comm_nego_ht,comm_nego_ttc}).select().single()
      if(error)throw error; return data
    }
    const deleteMandatDB = async id => { const {error}=await supabase.from('mandats').delete().eq('id',id); if(error)throw error }

    // ── STATS ──
    const computeStats = (mandats, config) => {
      const m26=mandats.filter(m=>!m.is_2025), m25=mandats.filter(m=>m.is_2025)
      const excl26=m26.filter(m=>m.type_mandat==='Exclusif').length
      const tauxExcl=m26.length?excl26/m26.length:0
      const comp26=m26.filter(m=>m.date_compromis), comp25=m25.filter(m=>m.date_compromis&&String(m.date_compromis).startsWith('2026'))
      const actes26=m26.filter(m=>m.date_acte), actes25=m25.filter(m=>m.date_acte&&String(m.date_acte).startsWith('2026'))
      const totalCommHT=[...actes26,...actes25].reduce((s,m)=>s+(+m.comm_nego_ht||0),0)
      const moisEc=config.mois_ecoules||3.6
      const projCA=moisEc>0?totalCommHT/moisEc*12:0
      const totalComp=comp26.length+comp25.length
      const commActeParMois=Array(12).fill(0), compParMois=Array(12).fill(0), actesParMois=Array(12).fill(0)
      ;[...comp26,...comp25].forEach(m=>{const mn=moisNum(m.date_compromis);if(mn)compParMois[mn-1]++})
      ;[...actes26,...actes25].forEach(m=>{const mn=moisNum(m.date_acte);if(mn){actesParMois[mn-1]++;commActeParMois[mn-1]+=(+m.comm_nego_ht||0)}})
      const pipeline=[...comp26,...comp25].filter(m=>!m.date_acte)
      return { totalMandats26:m26.length, exclusifs26:excl26, tauxExcl, totalComp, totalActes:actes26.length+actes25.length,
        totalCommHT, totalCommTTC:totalCommHT*1.20, projCA, panierMoyen:totalComp?totalCommHT/totalComp:0,
        avancementCA:totalCommHT/(config.objectif_ca||160000), commActeParMois, compParMois, actesParMois,
        pipeline, pipelineComm:pipeline.reduce((s,m)=>s+(+m.comm_nego_ht||0),0),
        m26, m25, actes26, actes25, comp26, comp25 }
    }

    // ── TOAST ──
    const showToast = (msg,dur=2500) => {
      const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show')
      setTimeout(()=>el.classList.remove('show'),dur)
    }

    // ── RENDER LOGIN ──
    const renderLogin = (mode='login') => {
      document.getElementById('app').innerHTML = `
        <div style="max-width:380px;margin:4rem auto;padding:0 1rem">
          <div style="text-align:center;margin-bottom:2rem">
            <div style="font-size:22px;font-weight:600;letter-spacing:-0.5px">négo<span style="color:var(--c-accent)">immo</span></div>
            <div style="font-size:13px;color:var(--c-muted);margin-top:4px">KPI 2026 · Tableau de bord négociateur</div>
          </div>
          <div class="form-card">
            <div style="display:flex;gap:4px;background:var(--c-bg);border-radius:8px;padding:3px;margin-bottom:1.25rem">
              <button class="tab-btn ${mode==='login'?'active':''}" style="flex:1" id="btn-show-login">Connexion</button>
              <button class="tab-btn ${mode==='signup'?'active':''}" style="flex:1" id="btn-show-signup">Inscription</button>
            </div>
            <div class="form-group" style="margin-bottom:10px">
              <label class="form-label">Email</label>
              <input class="form-input" id="auth-email" type="email" placeholder="votre@email.com"/>
            </div>
            <div class="form-group" style="margin-bottom:1.25rem">
              <label class="form-label">Mot de passe</label>
              <input class="form-input" id="auth-password" type="password" placeholder="••••••••"/>
            </div>
            <div id="auth-error" style="display:none;font-size:12px;color:var(--c-danger);margin-bottom:10px;padding:8px;background:var(--c-danger-light);border-radius:6px"></div>
            <button class="btn btn-primary" style="width:100%" id="btn-auth-submit">
              ${mode==='login'?'Se connecter':'Créer mon compte'}
            </button>
          </div>
        </div>`
      document.getElementById('btn-show-login').onclick = () => renderLogin('login')
      document.getElementById('btn-show-signup').onclick = () => renderLogin('signup')
      document.getElementById('auth-password').onkeydown = e => { if(e.key==='Enter') submitAuth(mode) }
      document.getElementById('btn-auth-submit').onclick = () => submitAuth(mode)
    }

    const submitAuth = async mode => {
      const email = document.getElementById('auth-email').value.trim()
      const password = document.getElementById('auth-password').value
      const errEl = document.getElementById('auth-error')
      if(!email||!password){ errEl.textContent='Veuillez remplir tous les champs.'; errEl.style.display='block'; return }
      try {
        errEl.style.display='none'
        const btn=document.getElementById('btn-auth-submit'); btn.textContent='…'; btn.disabled=true
        if(mode==='login'){ await login(email,password); await init() }
        else { await signup(email,password); showToast('Compte créé ! Vérifiez votre email.'); renderLogin('login') }
      } catch(e) {
        const msgs={'Invalid login credentials':'Email ou mot de passe incorrect.','Email not confirmed':'Confirmez votre email d\'abord.','User already registered':'Un compte existe déjà avec cet email.'}
        errEl.textContent=msgs[e.message]||e.message; errEl.style.display='block'
        const btn=document.getElementById('btn-auth-submit'); btn.textContent=mode==='login'?'Se connecter':'Créer mon compte'; btn.disabled=false
      }
    }

    // ── RENDER APP ──
    const render = () => {
      const s=computeStats(_mandats,_config)
      const tabs=['dashboard','saisie','mandats','remuneration'], labels=['Dashboard','Saisie','Mandats','Rémunération']
      const nav=`<nav class="nav">
        <div class="nav-logo">négo<span>immo</span> · KPI ${_config.annee||2026}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="nav-tabs">${tabs.map((p,i)=>`<button class="tab-btn ${_currentPage===p?'active':''}" data-page="${p}">${labels[i]}</button>`).join('')}</div>
          <button class="btn btn-secondary" style="font-size:11px;padding:5px 12px" id="btn-logout">Déconnexion</button>
        </div></nav>`
      document.getElementById('app').innerHTML = nav + `<div class="page active">${getPageContent(s)}</div>`
      document.querySelectorAll('.tab-btn[data-page]').forEach(b=>b.onclick=()=>{_currentPage=b.dataset.page;render();window.scrollTo({top:0,behavior:'smooth'})})
      document.getElementById('btn-logout').onclick = async()=>{ await logout(); _user=null; renderLogin() }
      bindPageEvents(s)
    }

    const getPageContent = s => {
      if(_currentPage==='dashboard') return renderDashboard(s)
      if(_currentPage==='saisie')    return renderSaisie()
      if(_currentPage==='mandats')   return renderMandats()
      if(_currentPage==='remuneration') return renderRemuneration(s)
      return ''
    }

    // ── DASHBOARD ──
    const renderDashboard = s => {
      const avPct=Math.round(s.avancementCA*100), avPctOff=Math.round(s.totalCommHT/(_config.objectif_ca_off||200000)*100)
      const avMand=Math.round(s.totalMandats26/(_config.objectif_mandats||36)*100)
      const moisEc=_config.mois_ecoules||3.6
      const caColor=avPct>=50?'kpi-ok':avPct>=35?'kpi-warn':'kpi-danger'
      const exclColor=s.tauxExcl>=0.5?'kpi-ok':'kpi-warn'
      const months=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']
      const barMax=Math.max(...s.commActeParMois,1)
      const bars=months.map((mn,i)=>{const v=s.commActeParMois[i],h=Math.round(v/barMax*100)
        return `<div class="bar-col"><div class="bar-wrap"><div class="bar" style="height:${h}%;background:${v>0?'var(--c-accent)':'var(--c-border)'}"></div></div>
          <div class="bar-label">${v>0?fmt(v).replace('\u00a0€',''):''}</div><div class="bar-month">${mn}</div></div>`}).join('')
      return `
        <div class="kpi-grid">
          <div class="kpi-card"><div class="kpi-label">CA réalisé (actes)</div><div class="kpi-value ${caColor}">${fmt(s.totalCommHT)}</div><div class="kpi-sub">obj. ${fmt(_config.objectif_ca||160000)} · ${avPct}% atteint</div></div>
          <div class="kpi-card"><div class="kpi-label">Unités de vente</div><div class="kpi-value kpi-neutral">${s.totalComp}</div><div class="kpi-sub">compromis · ${s.totalActes} actes</div></div>
          <div class="kpi-card"><div class="kpi-label">Taux d'exclusivité</div><div class="kpi-value ${exclColor}">${Math.round(s.tauxExcl*100)}%</div><div class="kpi-sub">obj. 50% · ${s.exclusifs26}/${s.totalMandats26}</div></div>
          <div class="kpi-card"><div class="kpi-label">Panier moyen</div><div class="kpi-value kpi-neutral">${s.totalComp?fmt(s.panierMoyen):'—'}</div><div class="kpi-sub">comm. négo HT / vente</div></div>
        </div>
        <div class="progress-section">
          <div class="progress-card"><div class="progress-header"><span class="progress-title">CA officiel (${fmt(_config.objectif_ca||160000)})</span><span class="progress-pct ${caColor}">${avPct}%</span></div>
            <div class="progress-track"><div class="progress-fill" style="width:${Math.min(avPct,100)}%;background:var(--c-accent)"></div></div>
            <div class="progress-detail"><span>${fmt(s.totalCommHT)}</span><span>Proj. ${fmt(Math.round(s.projCA))}</span></div></div>
          <div class="progress-card"><div class="progress-header"><span class="progress-title">CA officieux (${fmt(_config.objectif_ca_off||200000)})</span><span class="progress-pct ${avPctOff>=50?'kpi-ok':'kpi-warn'}">${avPctOff}%</span></div>
            <div class="progress-track"><div class="progress-fill" style="width:${Math.min(avPctOff,100)}%;background:var(--c-amber)"></div></div>
            <div class="progress-detail"><span>${fmt(s.totalCommHT)}</span><span>Proj. ${fmt(Math.round(s.projCA))}</span></div></div>
          <div class="progress-card"><div class="progress-header"><span class="progress-title">Mandats (obj. ${_config.objectif_mandats||36}/an)</span><span class="progress-pct ${avMand>=40?'kpi-ok':'kpi-warn'}">${avMand}%</span></div>
            <div class="progress-track"><div class="progress-fill" style="width:${Math.min(avMand,100)}%;background:var(--c-blue)"></div></div>
            <div class="progress-detail"><span>${s.totalMandats26} pris</span><span>Proj. ${Math.round(moisEc>0?s.totalMandats26/moisEc*12:0)}</span></div></div>
          <div class="progress-card"><div class="progress-header"><span class="progress-title">Actes authentiques</span><span class="progress-pct kpi-neutral">${s.totalActes}</span></div>
            <div class="progress-track"><div class="progress-fill" style="width:${Math.min(s.totalActes/12*100,100)}%;background:var(--c-accent2)"></div></div>
            <div class="progress-detail"><span>${s.actes25.length} mandat(s) 2025 · ${s.actes26.length} 2026</span></div></div>
        </div>
        <p class="section-title">Commissions négo HT — actes par mois</p>
        <div class="chart-card"><div class="bar-chart">${bars}</div></div>`
    }

    // ── SAISIE ──
    const renderSaisie = () => {
      const moisOpts=MONTHS.map(m=>`<option>${m}</option>`).join('')
      return `<div class="form-card">
        <div class="form-title">Nouveau mandat</div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Adresse</label><input class="form-input" id="f-adresse" placeholder="12 rue des Lilas"/></div>
          <div class="form-group"><label class="form-label">Ville</label><input class="form-input" id="f-ville" placeholder="LORIENT"/></div>
          <div class="form-group"><label class="form-label">Type de bien</label><select class="form-select" id="f-type"><option>Maison</option><option>Appartement</option><option>Terrain</option><option>Autre</option></select></div>
          <div class="form-group"><label class="form-label">Type de mandat</label><select class="form-select" id="f-mandat"><option>Exclusif</option><option>Simple</option></select></div>
          <div class="form-group"><label class="form-label">Mois</label><select class="form-select" id="f-mois">${moisOpts}</select></div>
          <div class="form-group"><label class="form-label">Origine RDV</label><select class="form-select" id="f-origine"><option>Prospection terrain</option><option>Prospection ciblée</option><option>Bouche-à-oreille</option><option>Réseau / partenaire</option><option>Notoriété agence</option><option>Acquéreur</option><option>Autre</option></select></div>
          <div class="form-group"><label class="form-label">Prix mandat (€)</label><input class="form-input" id="f-prix" type="number" placeholder="350000"/></div>
          <div class="form-group"><label class="form-label">Honoraires latents TTC (€)</label><input class="form-input" id="f-honTTC" type="number" placeholder="15000"/></div>
          <div class="form-group"><label class="form-label">Honoraires latents HT (auto)</label><input class="form-input" id="f-honHT" type="number" readonly style="background:#f1efe8;color:var(--c-muted)"/></div>
          <div class="form-group"><label class="form-label">% Négociateur</label><input class="form-input" id="f-pct" type="number" placeholder="22"/></div>
          <div class="form-group"><label class="form-label">Comm. Négo HT (auto)</label><input class="form-input" id="f-commHT" type="number" readonly style="background:#f1efe8;color:var(--c-muted)"/></div>
          <div class="form-group"><label class="form-label">Comm. Négo TTC (auto)</label><input class="form-input" id="f-commTTC" type="number" readonly style="background:#f1efe8;color:var(--c-muted)"/></div>
          <div class="form-group"><label class="form-label">Statut</label><select class="form-select" id="f-statut"><option>En cours</option><option>Compromis signé</option><option>Acte signé</option><option>Perdu</option></select></div>
          <div class="form-group"><label class="form-label">Prix de vente (€)</label><input class="form-input" id="f-prixVente" type="number" placeholder="si compromis ou acte"/></div>
          <div class="form-group"><label class="form-label">Date compromis</label><input class="form-input" id="f-dateComp" type="date"/></div>
          <div class="form-group"><label class="form-label">Date acte authentique</label><input class="form-input" id="f-dateActe" type="date"/></div>
          <div class="form-group"><label class="form-label">Mandat 2025 ?</label><select class="form-select" id="f-is2025"><option value="false">Non — 2026</option><option value="true">Oui — 2025</option></select></div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="btn-save-mandat">Enregistrer</button>
          <button class="btn btn-secondary" id="btn-reset-form">Effacer</button>
        </div></div>`
    }

    // ── MANDATS ──
    const renderMandats = () => {
      if(!_mandats.length) return `<div class="table-wrap"><div class="empty-state"><div class="empty-state-icon" style="font-size:32px">📋</div><div class="empty-state-text">Aucun mandat. Utilisez l'onglet Saisie.</div></div></div>`
      const rows=_mandats.map(m=>{
        const mB=m.type_mandat==='Exclusif'?'badge-excl':'badge-simple'
        const sB={'Compromis signé':'badge-comp','Acte signé':'badge-acte','Perdu':'badge-perdu'}[m.statut]||'badge-cours'
        const l25=m.is_2025?'<span class="badge badge-2025">2025</span>':''
        const del=!m.is_2025?`<button class="btn-icon btn-del" data-id="${m.id}">✕</button>`:''
        return `<div class="table-row ${m.is_2025?'is2025':''}">
          <span class="td">${m.adresse||'—'}${l25}</span>
          <span class="td td-muted">${m.type_bien||'—'}</span>
          <span class="td"><span class="badge ${mB}">${m.type_mandat}</span></span>
          <span class="td td-mono">${m.hon_ht?fmtN(Math.round(m.hon_ht))+' €':'—'}</span>
          <span class="td td-mono" style="color:var(--c-accent)">${m.comm_nego_ht?fmtN(Math.round(m.comm_nego_ht))+' €':'—'}</span>
          <span class="td"><span class="badge ${sB}">${m.statut||'—'}</span></span>
          <span class="td td-action">${del}</span></div>`}).join('')
      return `<div class="table-wrap">
        <div class="table-toolbar"><span class="table-count">${_mandats.length} mandat(s)</span></div>
        <div class="table-head"><span class="th">Adresse</span><span class="th">Type</span><span class="th">Mandat</span><span class="th">Hon. HT</span><span class="th">Comm. HT</span><span class="th">Statut</span><span class="th"></span></div>
        <div class="table-body">${rows}</div></div>`
    }

    // ── RÉMUNÉRATION ──
    const renderRemuneration = s => {
      const months=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc']
      const mkR=(arr,isAmt)=>arr.map((v,i)=>!v?'':
        `<div class="recap-row"><span class="recap-month">${months[i]}</span><span class="recap-val">${isAmt?fmt(Math.round(v)):v}</span></div>`).join('')||'<p class="recap-empty">Aucune donnée</p>'
      return `
        <div class="kpi-grid">
          <div class="kpi-card"><div class="kpi-label">Comm. Négo HT (actes)</div><div class="kpi-value kpi-ok">${fmt(Math.round(s.totalCommHT))}</div><div class="kpi-sub">mandats 2025 inclus</div></div>
          <div class="kpi-card"><div class="kpi-label">Comm. Négo TTC</div><div class="kpi-value kpi-neutral">${fmt(Math.round(s.totalCommTTC))}</div><div class="kpi-sub">× 1,20</div></div>
          <div class="kpi-card"><div class="kpi-label">En attente (compromis)</div><div class="kpi-value kpi-warn">${fmt(Math.round(s.pipelineComm))}</div><div class="kpi-sub">${s.pipeline.length} compromis sans acte</div></div>
          <div class="kpi-card"><div class="kpi-label">Projection annuelle</div><div class="kpi-value kpi-ok">${fmt(Math.round(s.projCA))}</div><div class="kpi-sub">au rythme actuel</div></div>
        </div>
        <p class="section-title">Récapitulatif mensuel</p>
        <div class="recap-grid">
          <div class="recap-card"><div class="recap-head">Compromis / mois</div>${mkR(s.compParMois,false)}</div>
          <div class="recap-card"><div class="recap-head">Actes / mois</div>${mkR(s.actesParMois,false)}</div>
          <div class="recap-card"><div class="recap-head">Comm. HT / mois</div>${mkR(s.commActeParMois,true)}</div>
        </div>`
    }

    // ── BIND EVENTS ──
    const bindPageEvents = s => {
      // Saisie
      const honTTC=document.getElementById('f-honTTC'), pct=document.getElementById('f-pct')
      if(honTTC) honTTC.oninput = () => {
        const ht=(parseFloat(honTTC.value)||0)/1.20, p=parseFloat(pct?.value)||0
        const cHT=ht*p/100
        document.getElementById('f-honHT').value=ht?ht.toFixed(2):''
        document.getElementById('f-commHT').value=cHT?cHT.toFixed(2):''
        document.getElementById('f-commTTC').value=cHT?(cHT*1.20).toFixed(2):''
      }
      if(pct) pct.oninput = () => honTTC?.dispatchEvent(new Event('input'))
      const btnSave=document.getElementById('btn-save-mandat')
      if(btnSave) btnSave.onclick = async() => {
        const g=id=>document.getElementById(id)?.value?.trim()||''
        const gf=id=>parseFloat(document.getElementById(id)?.value)||0
        try {
          await addMandatDB({adresse:g('f-adresse')||'—',ville:g('f-ville')||'—',type_bien:g('f-type'),type_mandat:g('f-mandat'),mois:g('f-mois'),origine_rdv:g('f-origine'),prix_mandat:gf('f-prix'),hon_ttc:gf('f-honTTC'),pct_nego:gf('f-pct'),statut:g('f-statut'),prix_vente:gf('f-prixVente')||null,date_compromis:g('f-dateComp')||null,date_acte:g('f-dateActe')||null,is_2025:g('f-is2025')==='true'})
          showToast('Mandat enregistré !'); _mandats=await getMandats(); render()
        } catch(e){ showToast('Erreur : '+e.message) }
      }
      const btnReset=document.getElementById('btn-reset-form')
      if(btnReset) btnReset.onclick=()=>['f-adresse','f-ville','f-prix','f-honTTC','f-honHT','f-pct','f-commHT','f-commTTC','f-prixVente','f-dateComp','f-dateActe'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''})
      // Supprimer mandat
      document.querySelectorAll('.btn-del').forEach(b=>b.onclick=async()=>{
        if(!confirm('Supprimer ce mandat ?'))return
        try{await deleteMandatDB(b.dataset.id);showToast('Supprimé');_mandats=await getMandats();render()}catch(e){showToast('Erreur : '+e.message)}
      })
    }

    // ── INIT ──
    const init = async () => {
      _user = await getUser()
      if(!_user){ renderLogin(); return }
      ;[_mandats,_config] = await Promise.all([getMandats(),getConfig()])
      render()
    }

    init()
  </script>
</body>
</html>
